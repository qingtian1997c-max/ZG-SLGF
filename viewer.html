<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 在线预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #525659; }
  #toolbar {
    background: #323639; color: #fff; padding: 8px 16px;
    display: flex; align-items: center; gap: 12px; font-size: 14px;
  }
  #toolbar a { color: #8ab4f8; text-decoration: none; margin-left: auto; }
  #toolbar .back { color: #8ab4f8; text-decoration: none; cursor: pointer; }
  iframe { width: 100%; height: calc(100vh - 44px); border: none; }
  #error { color: #ccc; text-align: center; padding: 60px; font-size: 16px; display: none; }
</style>
</head>
<body>
<div id="toolbar">
  <a class="back" href="javascript:history.back()">← 返回</a>
  <span style="flex:1;text-align:center">PDF 在线预览</span>
  <a id="download-link" href="#" download>下载 PDF</a>
</div>
<iframe id="pdf-frame" src="about:blank"></iframe>
<div id="error">PDF 加载失败，请尝试下载后本地查看</div>
<script>
const params = new URLSearchParams(location.search);
const fileUrl = params.get('file');
document.getElementById('download-link').href = fileUrl;
if (fileUrl) {
  document.getElementById('pdf-frame').src = fileUrl;
}
</script>
</body>
</html>
